<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Peakle — 세계 건축물 높이 맞추기 배틀</title>
<meta name="description" content="마천루·다리·성당·경기장… 세계 건축물의 높이를 맞춰라. 1대1 실시간 배틀, Peakle.">
<meta property="og:title" content="Peakle 🏙 세계 건축물 높이 맞추기 배틀">
<meta property="og:description" content="마천루·다리·성당·경기장의 높이를 맞춰라. 매일 새로운 데일리 챌린지와 1대1 실시간 배틀!">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B1026">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --sky0:#0B1026; --sky1:#17244A; --ink:#0B1026;
  --snow:#F2F6F9; --ice:#BFE3EE; --dim:#8FA3BF;
  --glow:#FF8E6E; --glow2:#FFB27A;
  --ok:#7BE0AD; --bad:#FF5470;
  --card:rgba(255,255,255,.055); --line:rgba(191,227,238,.16);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Outfit',-apple-system,'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
  background:linear-gradient(180deg,var(--sky0) 0%,var(--sky1) 62%,#2A3B66 100%);
  color:var(--snow); min-height:100dvh; overflow-x:hidden;
}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
#peaks{position:fixed;left:0;right:0;bottom:0;pointer-events:none;z-index:0;opacity:.9}
#app{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:20px 18px 150px;min-height:100dvh}
section{display:none;animation:fade .28s ease}
section.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

.logo{font-weight:900;font-size:44px;letter-spacing:.04em;text-align:center;margin:26px 0 2px;color:var(--snow)}
.logo .pk{color:var(--glow)}
.tag{color:var(--dim);text-align:center;font-size:14px;margin-bottom:26px}
.top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.back{background:rgba(191,227,238,.16);border:1.5px solid rgba(191,227,238,.55);color:#fff;border-radius:12px;padding:9px 16px;font-size:17px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(0,0,0,.35)}
.back:active{transform:scale(.95)}
.h1{font-size:20px;font-weight:700}

.field{margin:14px 0}
.lbl{display:block;font-size:13px;color:var(--dim);margin-bottom:6px}
input[type=text],input[type=tel]{
  width:100%;background:var(--card);border:1px solid var(--line);border-radius:14px;
  color:var(--snow);font-size:18px;padding:14px 16px;outline:none;font-family:inherit;font-weight:700;
}
input:focus{border-color:var(--glow)}
.btn{
  display:block;width:100%;border:none;border-radius:16px;padding:16px;margin:10px 0;
  font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink);
  background:linear-gradient(135deg,var(--glow2),var(--glow));transition:transform .08s;
}
.btn:active{transform:scale(.98)}
.btn.ghost{background:var(--card);color:var(--snow);border:1px solid var(--line)}
.btn.small{width:auto;display:inline-block;padding:10px 18px;font-size:14px;margin:4px 4px 4px 0}
.btn:disabled{opacity:.4;cursor:default}
.row{display:flex;gap:10px}.row .btn{flex:1}
.note{font-size:12.5px;color:var(--dim);line-height:1.55;margin-top:8px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin:12px 0}

/* 대전 화면 */
.hpwrap{display:flex;gap:10px;margin-bottom:6px}
.hpside{flex:1}
.hpname{font-size:12px;color:var(--dim);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hpname.me{color:var(--ice)}
.hpbar{height:14px;border-radius:8px;background:rgba(0,0,0,.35);overflow:hidden;border:1px solid var(--line)}
.hpfill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--ok),#4CC98F);transition:width .6s cubic-bezier(.2,.8,.2,1)}
.hpfill.enemy{background:linear-gradient(90deg,var(--bad),#D63A5E)}
.hpnum{font-size:11px;color:var(--dim);margin-top:3px;text-align:right}
.roundbar{display:flex;justify-content:space-between;align-items:center;margin:10px 0 4px}
.roundtxt{font-size:14px;color:var(--ice);font-weight:700}
.mult{font-size:12px;font-weight:900;color:var(--ink);background:var(--glow2);border-radius:8px;padding:3px 8px}
.mult.x2{background:#FFD166}.mult.x3{background:var(--bad);color:#fff}

.mt{
  margin:10px 0;background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;
}
.mtimg{width:100%;aspect-ratio:16/9;display:block;background:#101832;position:relative;overflow:hidden}
.mtimg svg{width:100%;height:100%;display:block}
.mtimg img.photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.mtcredit{position:absolute;right:6px;bottom:5px;font-size:10px;color:rgba(255,255,255,.85);background:rgba(0,0,0,.45);padding:2px 7px;border-radius:8px;text-decoration:none;z-index:2}
.mtmeta{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 14px 16px;text-align:left}
.mtflagimg{width:42px;height:auto;border-radius:5px;box-shadow:0 1px 5px rgba(0,0,0,.5);flex:none;border:1px solid rgba(255,255,255,.15)}
.mtname{font-size:26px;font-weight:900;word-break:keep-all;user-select:none;line-height:1.15}
.mtsub{font-size:13px;color:var(--dim);margin-top:3px}
.timer{height:8px;border-radius:6px;background:rgba(0,0,0,.35);overflow:hidden;margin:12px 0;border:1px solid var(--line)}
.timerfill{height:100%;background:linear-gradient(90deg,var(--ice),var(--glow));width:100%}
.guessrow{display:flex;gap:8px}
.guessrow input{flex:1;text-align:center;font-size:24px;font-weight:900;letter-spacing:.02em}
.unit{display:flex;align-items:center;color:var(--dim);font-weight:700;font-size:16px;padding:0 4px}
.gbtn{border:none;border-radius:14px;padding:0 22px;font-size:17px;font-weight:900;font-family:inherit;color:var(--ink);background:linear-gradient(135deg,var(--glow2),var(--glow));cursor:pointer}
.gbtn:disabled{opacity:.4}
.waitmsg{text-align:center;color:var(--dim);font-size:14px;margin-top:10px;min-height:20px}

/* 정답 공개 */
.reveal{text-align:center;padding:8px 0 4px}
.alt{font-size:52px;font-weight:900;color:var(--glow2);letter-spacing:.01em;font-variant-numeric:tabular-nums}
.altlbl{font-size:13px;color:var(--dim)}
.cmp{display:flex;gap:10px;margin-top:12px}
.cmpbox{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px}
.cmpwho{font-size:12px;color:var(--dim)}
.cmpval{font-size:19px;font-weight:900;margin-top:2px;font-variant-numeric:tabular-nums}
.cmpdmg{font-size:14px;font-weight:900;margin-top:2px;color:var(--bad)}
.cmpdmg.pts{color:var(--ok)}

/* 결과 */
.bigres{text-align:center;margin:30px 0 8px;font-size:40px;font-weight:900}
.bigres.win{color:var(--ok)}.bigres.lose{color:var(--bad)}.bigres.draw{color:var(--ice)}
.score{text-align:center;font-size:48px;font-weight:900;color:var(--glow2);font-variant-numeric:tabular-nums}
.emrow{text-align:center;font-size:30px;letter-spacing:4px;margin:8px 0}
.codebox{text-align:center;font-size:40px;font-weight:900;letter-spacing:10px;color:var(--glow2);background:var(--card);border:1px dashed var(--line);border-radius:16px;padding:18px;margin:14px 0}
.spin{width:44px;height:44px;border-radius:50%;border:4px solid var(--line);border-top-color:var(--glow);animation:sp 1s linear infinite;margin:26px auto}
@keyframes sp{to{transform:rotate(360deg)}}
.center{text-align:center}
.setrow{display:flex;justify-content:space-between;align-items:center;padding:14px 2px;border-bottom:1px solid var(--line)}
.setrow:last-child{border-bottom:none}
.seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.seg button{border:none;background:none;color:var(--dim);padding:8px 14px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer}
.seg button.on{background:var(--glow);color:var(--ink)}
select{background:var(--card);border:1px solid var(--line);color:var(--snow);border-radius:10px;padding:8px 10px;font-family:inherit;font-size:14px}
select option{color:#000}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:rgba(11,16,38,.95);border:1px solid var(--line);color:var(--snow);padding:12px 20px;border-radius:14px;font-size:14px;z-index:99;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center}
.toast.on{opacity:1}
.pill{display:inline-block;background:var(--card);border:1px solid var(--line);border-radius:99px;padding:4px 12px;font-size:12px;color:var(--dim);margin:2px}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<svg id="peaks" viewBox="0 0 480 150" preserveAspectRatio="xMidYMax slice" height="150" width="100%">
  <polygon points="0,150 60,70 110,120 170,40 230,120 280,80 340,130 400,55 480,150" fill="#131C3B"/>
  <polygon points="0,150 90,95 150,135 220,75 300,140 370,95 440,140 480,120 480,150" fill="#0E1530"/>
  <polygon points="165,46 170,40 176,47 172,45 169,48" fill="#E8F2F7"/>
  <polygon points="395,61 400,55 406,62 401,60" fill="#E8F2F7"/>
</svg>
<div id="app">

<!-- 홈 -->
<section id="s-home" class="on">
  <div class="logo">PE<span class="pk">A</span>KLE</div>
  <div class="tag" data-i="tag"></div>
  <div class="field">
    <label class="lbl" data-i="nick"></label>
    <input type="text" id="nick" maxlength="12" autocomplete="off">
  </div>
  <button class="btn" id="b-daily"></button>
  <button class="btn" id="b-battle"></button>
  <button class="btn ghost" id="b-practice"></button>
  <button class="btn ghost" id="b-settings"></button>
  <div class="center" style="margin-top:14px">
    <span class="pill" id="mtcount"></span>
  </div>
</section>

<!-- 대결 로비 -->
<section id="s-battle">
  <div class="top"><button class="back" data-go="home">←</button><div class="h1" data-i="battle"></div></div>
  <button class="btn" id="b-quick"></button>
  <button class="btn ghost" id="b-create"></button>
  <div class="field">
    <label class="lbl" data-i="join_lbl"></label>
    <div class="guessrow">
      <input type="text" id="joincode" maxlength="5" autocomplete="off" style="text-transform:uppercase;letter-spacing:6px;text-align:center">
      <button class="gbtn" id="b-join" data-i="join"></button>
    </div>
  </div>
  <p class="note" data-i="battle_note"></p>
</section>

<!-- 매칭/대기 -->
<section id="s-wait">
  <div class="top"><button class="back" id="b-cancelwait">←</button><div class="h1" id="waittitle"></div></div>
  <div class="spin"></div>
  <div class="center" id="waitdesc" style="color:var(--dim);font-size:14px"></div>
  <div class="codebox" id="roomcodebox" style="display:none"></div>
  <button class="btn ghost" id="b-copycode" style="display:none"></button>
</section>

<!-- 게임(공용: 대결/데일리/연습) -->
<section id="s-game">
  <div id="hparea">
    <div class="hpwrap">
      <div class="hpside"><div class="hpname me" id="myname"></div><div class="hpbar"><div class="hpfill" id="myhp"></div></div><div class="hpnum" id="myhpn"></div></div>
      <div class="hpside"><div class="hpname" id="foename" style="text-align:right"></div><div class="hpbar"><div class="hpfill enemy" id="foehp"></div></div><div class="hpnum" id="foehpn" style="text-align:left"></div></div>
    </div>
  </div>
  <div class="roundbar">
    <div class="roundtxt" id="roundtxt"></div>
    <div class="mult" id="multbadge" style="display:none"></div>
    <div class="roundtxt" id="scoretxt" style="color:var(--glow2)"></div>
  </div>
  <div class="mt">
    <div class="mtimg" id="mtimg"></div>
    <div class="mtmeta">
      <img class="mtflagimg" id="mtflag" alt="flag">
      <div>
        <div class="mtname" id="mtname">—</div>
        <div class="mtsub" id="mtsub"></div>
      </div>
    </div>
  </div>
  <div class="timer"><div class="timerfill" id="timerfill"></div></div>
  <div id="guessarea">
    <div class="guessrow">
      <input type="tel" id="guess" inputmode="numeric" autocomplete="off" placeholder="0">
      <div class="unit" id="unitlbl">m</div>
      <button class="gbtn" id="b-submit">⏎</button>
    </div>
    <div class="waitmsg" id="waitmsg"></div>
  </div>
  <div id="revealarea" style="display:none">
    <div class="reveal">
      <div class="altlbl" data-i="answer"></div>
      <div class="alt" id="altnum">0</div>
      <div class="cmp" id="cmparea"></div>
    </div>
    <div class="waitmsg" id="nextmsg"></div>
  </div>
  <button class="btn ghost" id="b-quitgame" style="margin-top:16px"></button>
</section>

<!-- 대결 결과 -->
<section id="s-result">
  <div class="bigres" id="restitle"></div>
  <div class="center" id="ressub" style="color:var(--dim)"></div>
  <div class="card">
    <div class="cmp">
      <div class="cmpbox"><div class="cmpwho" id="r-myname"></div><div class="cmpval" id="r-myhp"></div></div>
      <div class="cmpbox"><div class="cmpwho" id="r-foename"></div><div class="cmpval" id="r-foehp"></div></div>
    </div>
  </div>
  <button class="btn" id="b-share-battle"></button>
  <button class="btn ghost" data-go="home" data-i="home"></button>
</section>

<!-- 데일리 결과 -->
<section id="s-daily-result">
  <div class="top"><button class="back" data-go="home">←</button><div class="h1" id="dailytitle"></div></div>
  <div class="score" id="dailyscore"></div>
  <div class="center" style="color:var(--dim);font-size:13px" data-i="daily_max"></div>
  <div class="emrow" id="dailyemoji"></div>
  <div class="card" id="dailydetail" style="font-size:14px;line-height:2"></div>
  <button class="btn" id="b-share-daily"></button>
  <button class="btn ghost" data-go="home" data-i="home"></button>
  <p class="note center" data-i="daily_next"></p>
</section>

<!-- 설정 -->
<section id="s-settings">
  <div class="top"><button class="back" data-go="home">←</button><div class="h1" data-i="settings"></div></div>
  <div class="card">
    <div class="setrow"><span data-i="lang"></span>
      <select id="langsel">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="" disabled>中文 (준비 중)</option>
        <option value="" disabled>日本語 (준비 중)</option>
        <option value="" disabled>Español (준비 중)</option>
        <option value="" disabled>Français (준비 중)</option>
        <option value="" disabled>हिन्दी (준비 중)</option>
      </select>
    </div>
    <div class="setrow"><span data-i="unit"></span>
      <div class="seg"><button id="u-m">m</button><button id="u-ft">ft</button></div>
    </div>
    <div class="setrow"><span data-i="sound"></span>
      <div class="seg"><button id="snd-on" data-i="on"></button><button id="snd-off" data-i="off"></button></div>
    </div>
  </div>
  <p class="note" data-i="settings_note"></p>
</section>

</div>
<div class="toast" id="toast"></div>

<script src="mountains.js"></script>

/* ===== 건축물 일러스트 생성기 (사진 없을 때 폴백) =====
   이름+국가로 시드를 만들어 항상 같은 그림이 나오되,
   '높이'는 시드에 넣지 않아 그림이 정답 힌트가 되지 않음 */
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
const PALETTES=[
 {sky:["#0B1026","#2A3B66"],ridge:["#4A5B8C","#2E3C68","#1A2547"],orb:"#E8F0F7",night:1},          // 밤
 {sky:["#1B2A4A","#FF8E6E"],ridge:["#6E5A7E","#43395F","#241F40"],orb:"#FFD9A0"},                   // 새벽
 {sky:["#7FB8D8","#DCEFF7"],ridge:["#5E7FA6","#3E5C82","#27405E"],orb:"#FFF4D6"},                   // 낮
 {sky:["#2E2440","#FF6E5F"],ridge:["#7A4A5E","#4E3048","#2A1B33"],orb:"#FFC48A"},                   // 노을
 {sky:["#22333F","#87A8A4"],ridge:["#57707A","#3A4F58","#232F36"],orb:"#E5EEEA"},                   // 안개
];
function mountainArt(m){
  const cat=m[4]||0;
  const rnd=mulberry32(hashStr(m[0]+"|"+m[1]));
  const P=PALETTES[Math.floor(rnd()*PALETTES.length)];
  const W=400,H=225,gid="g"+Math.floor(rnd()*1e6);
  let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">`;
  s+=`<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${P.sky[0]}"/><stop offset="1" stop-color="${P.sky[1]}"/></linearGradient></defs>`;
  s+=`<rect width="${W}" height="${H}" fill="url(#${gid})"/>`;
  if(P.night){for(let i=0;i<26;i++)s+=`<circle cx="${rnd()*W}" cy="${rnd()*H*.5}" r="${.5+rnd()}" fill="#F2F6F9" opacity="${.3+rnd()*.6}"/>`;}
  const ox=40+rnd()*(W-80),oy=22+rnd()*55,orr=P.night?13+rnd()*5:16+rnd()*8;
  s+=`<circle cx="${ox}" cy="${oy}" r="${orr*2.1}" fill="${P.orb}" opacity=".14"/>`;
  s+=`<circle cx="${ox}" cy="${oy}" r="${orr}" fill="${P.orb}" opacity=".95"/>`;

  if(cat===1||cat===2){ /* ===== 건물·타워: 도시 스카이라인 ===== */
    for(let l=0;l<2;l++){
      const base=H, col=P.ridge[l+1], n=4+Math.floor(rnd()*3);
      for(let i=0;i<n;i++){
        const bw=34+rnd()*44, bx=(W/n)*i+rnd()*20-10, bh=(l===0?60:95)+rnd()*(l===0?70:95);
        s+=`<rect x="${bx.toFixed(1)}" y="${(base-bh).toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="${col}"/>`;
        if(rnd()<.4) s+=`<rect x="${(bx+bw*.35).toFixed(1)}" y="${(base-bh-14).toFixed(1)}" width="${(bw*.3).toFixed(1)}" height="14" fill="${col}"/>`;
        if(l===1){ // 앞줄 건물 창문 불빛
          const wc=P.night?"#FFD98A":"#E8F0F7", rows=Math.floor(bh/16), cols=Math.floor(bw/12);
          for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)
            if(rnd()<(P.night?.45:.25)) s+=`<rect x="${(bx+4+c*12).toFixed(1)}" y="${(base-bh+6+r*16).toFixed(1)}" width="5" height="7" fill="${wc}" opacity=".85"/>`;
        }
      }
    }
    // 시그니처 첨탑 빌딩
    const sx=110+rnd()*180, sh=150+rnd()*45, swd=26+rnd()*14;
    s+=`<polygon points="${sx-swd},${H} ${sx-swd},${H-sh*.72} ${sx},${H-sh} ${sx+swd},${H-sh*.72} ${sx+swd},${H}" fill="${P.ridge[2]}"/>`;
    s+=`<rect x="${sx-1.2}" y="${H-sh-22}" width="2.4" height="24" fill="${P.ridge[2]}"/>`;
    s+=`<circle cx="${sx}" cy="${H-sh-23}" r="2.6" fill="${P.night?"#FF6E5F":P.orb}"/>`;
  }
  else{ /* ===== 그 외: 기념물 실루엣 ===== */
    // 지평선 + 잔디/광장
    s+=`<rect x="0" y="${H-40}" width="${W}" height="40" fill="${P.ridge[2]}"/>`;
    s+=`<ellipse cx="${W/2}" cy="${H-40}" rx="120" ry="8" fill="${P.ridge[1]}" opacity=".6"/>`;
    const kind=Math.floor(rnd()*3), cx=W/2, gy=H-40, col=P.ridge[2], hi=P.ridge[0];
    // 받침대
    s+=`<rect x="${cx-42}" y="${gy-22}" width="84" height="22" fill="${col}"/>`;
    s+=`<rect x="${cx-30}" y="${gy-34}" width="60" height="12" fill="${hi}"/>`;
    if(kind===0){ // 오벨리스크/타워형
      s+=`<polygon points="${cx-14},${gy-34} ${cx-8},${gy-158} ${cx+8},${gy-158} ${cx+14},${gy-34}" fill="${col}"/>`;
      s+=`<polygon points="${cx-8},${gy-158} ${cx},${gy-176} ${cx+8},${gy-158}" fill="${hi}"/>`;
    }else if(kind===1){ // 아치형
      s+=`<path d="M${cx-62},${gy-34} A62,110 0 0 1 ${cx+62},${gy-34} L${cx+40},${gy-34} A40,84 0 0 0 ${cx-40},${gy-34} Z" fill="${col}"/>`;
    }else{ // 돔·석상형
      s+=`<rect x="${cx-26}" y="${gy-96}" width="52" height="62" fill="${col}"/>`;
      s+=`<path d="M${cx-30},${gy-96} A30,30 0 0 1 ${cx+30},${gy-96} Z" fill="${hi}"/>`;
      s+=`<rect x="${cx-2}" y="${gy-134}" width="4" height="14" fill="${hi}"/>`;
      s+=`<circle cx="${cx}" cy="${gy-138}" r="4" fill="${hi}"/>`;
    }
  }
  s+=`</svg>`;
  return s;
}
const CATS={1:{ko:"건물",en:"Building",ic:"🏢"},2:{ko:"타워",en:"Tower",ic:"🗼"},3:{ko:"다리",en:"Bridge",ic:"🌉"},4:{ko:"기념물·동상",en:"Monument / Statue",ic:"🗽"},5:{ko:"종교 건축",en:"Religious",ic:"⛪"},6:{ko:"경기장·구조물",en:"Stadium / Structure",ic:"🏟"}};
function toUnit(mm){ return unit==="m" ? mm : Math.round(mm*3.28084); }

/* 데미지/점수: 오차비율 r → 0~1000 (GeoGuessr식 곡선) */
function calcDamage(guessM, actualM){
  if(guessM==null) return 1000;
  const r = Math.min(1, Math.abs(guessM-actualM)/actualM);
  return Math.round(1000 * Math.pow(r, .8));
}
const multOf = r => r>=11 ? 3 : r>=6 ? 2 : 1;

/* 시드 랜덤 (데일리용) */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function pickSeeded(seed,count){
  const rnd = mulberry32(seed), out=new Set();
  while(out.size<count) out.add(Math.floor(rnd()*MT.length));
  return [...out];
}
const dailyNum = () => Math.floor((Date.now()-LAUNCH_UTC)/86400000)+1;

/* 카테고리별 인덱스 (산/건물/구조물/폭포 균등 출제용) */
const CATIDX={};
MT.forEach((m,i)=>{const c=m[4]||0;(CATIDX[c]=CATIDX[c]||[]).push(i);});
const CATKEYS=Object.keys(CATIDX);
function pickBalanced(rnd,count){
  const out=new Set();
  while(out.size<count){
    const arr=CATIDX[CATKEYS[Math.floor(rnd()*CATKEYS.length)]];
    out.add(arr[Math.floor(rnd()*arr.length)]);
  }
  return [...out];
}
const pickBalancedSeeded=(seed,count)=>pickBalanced(mulberry32(seed),count);
const pickOneBalanced=()=>pickBalanced(Math.random,1)[0];

/* ===== Wikipedia 실사진 로더 (없으면 생성 일러스트 유지) ===== */
const photoCache={};
let photoToken=0;
async function loadPhoto(m,token){
  const key=m[0]+"|"+m[1];
  if(!(key in photoCache)){
    photoCache[key]=null;
    try{
      const title=m[0].replace(/\s*\(.*?\)\s*/g," ").trim();
      const r=await fetch("https://en.wikipedia.org/api/rest_v1/page/summary/"+encodeURIComponent(title),{headers:{"Accept":"application/json"}});
      if(r.ok){
        const j=await r.json();
        if(j.type==="standard"&&j.thumbnail&&j.thumbnail.source)
          photoCache[key]={src:j.thumbnail.source.replace(/\/(\d+)px-/,"/900px-"),page:(j.content_urls&&j.content_urls.desktop)?j.content_urls.desktop.page:null};
      }
    }catch(e){}
  }
  if(token!==photoToken) return;           // 이미 다음 라운드로 넘어감
  const p=photoCache[key]; if(!p) return;  // 사진 없음 → 일러스트 유지
  const img=new Image();
  img.onload=()=>{ if(token!==photoToken) return;
    img.className="photo"; img.draggable=false;
    $("mtimg").appendChild(img);
    const a=document.createElement("a");
    a.className="mtcredit"; a.textContent=(L==="ko"?"사진: Wikipedia":"Photo: Wikipedia");
    if(p.page){a.href=p.page;a.target="_blank";a.rel="noopener";}
    $("mtimg").appendChild(a);
  };
  img.src=p.src;
}

/* ================= 효과음 (WebAudio 합성) ================= */
let AC;
function beep(freqs,dur=.16,gain=.12){
  if(!sound) return;
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    freqs.forEach((f,i)=>{
      const o=AC.createOscillator(), g=AC.createGain();
      o.type="sine"; o.frequency.value=f;
      g.gain.setValueAtTime(0,AC.currentTime+i*dur);
      g.gain.linearRampToValueAtTime(gain,AC.currentTime+i*dur+.02);
      g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+(i+1)*dur);
      o.connect(g).connect(AC.destination);
      o.start(AC.currentTime+i*dur); o.stop(AC.currentTime+(i+1)*dur+.05);
    });
  }catch(e){}
}
const sndReveal = good => good ? beep([659,880]) : beep([330,262]);
const sndWin  = () => beep([523,659,784,1047],.14);
const sndLose = () => beep([392,330,262],.2);

let G = null;           // 현재 게임 상태
let timerRAF = null, revealTimer = null, unsub = [], matchTimer = null;

function cleanupGame(){
  cancelAnimationFrame(timerRAF); clearTimeout(revealTimer); clearTimeout(matchTimer);
  unsub.forEach(u=>u()); unsub=[];
  if(G && G.fb){
    if(G.queueRef) remove(G.queueRef).catch(()=>{});
    if(G.roomRef && G.iAmHost && (G.phase==="end"||G.phase==="lobby")) remove(G.roomRef).catch(()=>{});
    else if(G.roomRef && G.phase!=="end") update(ref(db,`rooms/${G.roomId}/players/${uid}`),{left:true}).catch(()=>{});
  }
  G=null;
}

function showMountain(m){
  photoToken++;
  $("mtimg").innerHTML = mountainArt(m);
  $("mtflag").src = flagURL(m[1]);
  $("mtname").textContent = mtName(m);
  loadPhoto(m,photoToken);
  const c=CATS[m[4]||0];
  $("mtsub").textContent = c.ic+" "+(L==="ko"?c.ko:c.en) + ((L==="ko"&&m[3]) ? " · "+m[0] : "");
  $("guess").value=""; $("guess").disabled=false; $("b-submit").disabled=false;
  $("waitmsg").textContent="";
  $("guessarea").style.display="block"; $("revealarea").style.display="none";
  setTimeout(()=>$("guess").focus(),80);
}
function runTimer(deadline,onExpire){
  cancelAnimationFrame(timerRAF);
  const total=15000;
  const tick=()=>{
    const left=Math.max(0,deadline-now());
    $("timerfill").style.width=(left/total*100)+"%";
    $("timerfill").style.background=left<4000?"var(--bad)":"linear-gradient(90deg,var(--ice),var(--glow))";
    if(left<=0){ onExpire&&onExpire(); return; }
    timerRAF=requestAnimationFrame(tick);
  };
  tick();
}
function countUp(el,target){
  const t0=performance.now(),dur=900;
  const step=n=>{const p=Math.min(1,(n-t0)/dur),e=1-Math.pow(1-p,3);
    el.textContent=Math.round(target*e).toLocaleString()+" "+unit;
    if(p<1)requestAnimationFrame(step);};
  requestAnimationFrame(step);
}
function cmpBox(who,val,sub,isPts){
  return `<div class="cmpbox"><div class="cmpwho">${who}</div><div class="cmpval">${val}</div><div class="cmpdmg${isPts?" pts":""}">${sub}</div></div>`;
}

/* ================= 싱글 (데일리 / 연습) ================= */
function startSolo(mode){
  const n=nickname(); if(!nickOk(n)) return;
  const dn=dailyNum();
  if(mode==="daily"){
    const saved=localStorage.getItem("pk_daily_"+dn);
    if(saved){ showDailyResult(JSON.parse(saved),dn); return; }
  }
  G={mode, fb:false, round:1, pts:[], guesses:[],
     mts: mode==="daily" ? pickBalancedSeeded(dn*7919+13,5) : null,
     total: mode==="daily" ? 5 : Infinity };
  $("hparea").style.display="none"; $("multbadge").style.display="none";
  $("b-quitgame").style.display = mode==="practice" ? "block" : "none";
  screen("game"); soloRound();
}
function soloRound(){
  const idx = G.mode==="daily" ? G.mts[G.round-1] : pickOneBalanced();
  G.cur=idx;
  const m=MT[idx];
  $("roundtxt").textContent = t("round")+" "+G.round+(G.mode==="daily"?" / 5":"");
  const sum=G.pts.reduce((a,b)=>a+b,0);
  $("scoretxt").textContent = G.mode==="practice" && G.pts.length
    ? t("avg_pts")+" "+Math.round(sum/G.pts.length) : (G.mode==="daily"? sum.toLocaleString()+t("pts") : "");
  showMountain(m);
  G.deadline=now()+15000;
  runTimer(G.deadline,()=>soloSubmit(null));
}
function soloSubmit(raw){
  if(!G||G.locked)return; G.locked=true;
  cancelAnimationFrame(timerRAF);
  const m=MT[G.cur], actual=m[2];
  const guessM = raw==null?null:fromUnit(raw);
  const dmg=calcDamage(guessM,actual), pts=1000-dmg;
  G.pts.push(pts); G.guesses.push(guessM);
  $("guessarea").style.display="none"; $("revealarea").style.display="block";
  countUp($("altnum"),toUnit(actual));
  const err = guessM==null?t("timeout"):t("err")+" "+Math.abs(toUnit(actual)-toUnit(guessM)).toLocaleString()+" "+unit;
  $("cmparea").innerHTML=cmpBox(t("me"),guessM==null?"—":fmtH(guessM),err+" · +"+pts+t("pts"),true);
  $("nextmsg").textContent=t("next_in");
  sndReveal(pts>=600);
  revealTimer=setTimeout(()=>{
    G.locked=false; G.round++;
    if(G.mode==="daily"&&G.round>5){
      const res={s:G.pts.reduce((a,b)=>a+b,0),p:G.pts};
      localStorage.setItem("pk_daily_"+dailyNum(),JSON.stringify(res));
      showDailyResult(res,dailyNum());
    } else soloRound();
  },3200);
}
const emOf=p=>p>=850?"🏔️":p>=600?"⛰️":p>=300?"🗻":"🪨";
function showDailyResult(res,dn){
  cleanupGame();
  $("dailytitle").textContent=t("daily_title")+" #"+dn;
  $("dailyscore").textContent=res.s.toLocaleString();
  $("dailyemoji").textContent=res.p.map(emOf).join("");
  $("dailydetail").innerHTML=res.p.map((p,i)=>`${t("round")} ${i+1} — ${emOf(p)} ${p}${t("pts")}`).join("<br>");
  $("b-share-daily").onclick=()=>share(STR[L].share_daily(dn,res.s,res.p.map(emOf).join(""))+location.href);
  screen("daily-result");
}

}

/* --- 봇 대결 (오프라인) --- */
function startBotGame(){
  const myNick=localStorage.getItem("pk_nick");
  const foe=BOTNAMES[Math.floor(Math.random()*BOTNAMES.length)];
  G={mode:"bot",fb:false,round:1,myHP:5000,foeHP:5000,foeNick:foe,
     mts:pickBalancedSeeded(Math.floor(Math.random()*1e9),15)};
  battleUIBase(myNick,foe); screen("game"); botRound();
}
function botRound(){
  const m=MT[G.mts[G.round-1]];
  battleRoundUI(G.round); showMountain(m);
  G.deadline=now()+15000; G.myGuess=undefined;
  // 봇: 4~11초 후 실제높이 ±(10~40%) 추측 (약간 약하게)
  const e=(0.10+Math.random()*0.30)*(Math.random()<.5?-1:1);
  G.botGuess=Math.max(50,Math.round(m[2]*(1+e)));
  runTimer(G.deadline,()=>{ if(G.myGuess===undefined) botSubmit(null); });
}
function botSubmit(raw){
  if(!G||G.myGuess!==undefined)return;
  G.myGuess = raw==null?null:fromUnit(raw);
  $("guess").disabled=true;$("b-submit").disabled=true;
  $("waitmsg").textContent=t("submit_done");
  const wait=Math.max(0, (4000+Math.random()*7000)-(15000-(G.deadline-now())));
  revealTimer=setTimeout(()=>botReveal(),Math.min(wait, Math.max(0,G.deadline-now())));
}
function botReveal(){
  cancelAnimationFrame(timerRAF);
  const m=MT[G.mts[G.round-1]],actual=m[2],mult=multOf(G.round);
  const dMe=calcDamage(G.myGuess,actual)*mult, dFoe=calcDamage(G.botGuess,actual)*mult;
  G.myHP-=dMe; G.foeHP-=dFoe;
  $("guessarea").style.display="none"; $("revealarea").style.display="block";
  countUp($("altnum"),toUnit(actual)); setHP(G.myHP,G.foeHP);
  $("cmparea").innerHTML =
    cmpBox(t("me"),G.myGuess==null?"—":fmtH(G.myGuess),"-"+dMe+" "+t("damage")) +
    cmpBox(G.foeNick,fmtH(G.botGuess),"-"+dFoe+" "+t("damage"));
  sndReveal(dMe<=dFoe);
  const dead=G.myHP<=0||G.foeHP<=0, last=G.round>=15;
  $("nextmsg").textContent = dead||last ? "" : t("next_in");
  revealTimer=setTimeout(()=>{
    if(dead||last){ endBattle(G.myHP,G.foeHP,G.foeNick); }
    else{ G.round++; botRound(); }
  },4200);
}

function endBattle(myHP,foeHP,foeNick,walkover){
  cleanupGame();
  const win = walkover ? true : myHP>foeHP, draw=!walkover&&myHP===foeHP;
  $("restitle").textContent=draw?t("draw"):win?t("win"):t("lose");
  $("restitle").className="bigres "+(draw?"draw":win?"win":"lose");
  $("ressub").textContent=walkover?t("opp_left"):draw?t("draw_sub"):win?t("win_sub"):t("lose_sub");
  $("r-myname").textContent=localStorage.getItem("pk_nick");$("r-foename").textContent=foeNick;
  $("r-myhp").textContent="HP "+Math.max(0,myHP).toLocaleString();
  $("r-foehp").textContent="HP "+Math.max(0,foeHP).toLocaleString();
  const w=draw?t("draw"):win?t("win"):t("lose");
  $("b-share-battle").onclick=()=>share(STR[L].share_battle(w,localStorage.getItem("pk_nick"),foeNick)+location.href);
  draw?0:win?sndWin():sndLose();
  screen("result");
}

/* --- 온라인 대결 공통 --- */
const CODE=()=> Array.from({length:5},()=>"ABCDEFGHJKLMNPQRSTUVWXYZ23456789"[Math.floor(Math.random()*32)]).join("");

async function quickMatch(){
  const n=nickname(); if(!nickOk(n)) return;
  $("waittitle").textContent=t("matching"); $("waitdesc").textContent=t("matching_desc");
  $("roomcodebox").style.display="none"; $("b-copycode").style.display="none";
  screen("wait");
  G={mode:"net",fb:true};
  // 1) 대기열에서 상대 찾기
  const snap=await get(ref(db,"queue"));
  let claimed=null;
  if(snap.exists()){
    for(const [ouid,e] of Object.entries(snap.val())){
      if(ouid===uid||!e||now()-e.ts>25000) continue;
      const r=await runTransaction(ref(db,"queue/"+ouid),cur=>cur===null?undefined:null);
      if(r.committed&&r.snapshot.val()===null){ claimed={ouid,nick:e.nick}; break; }
    }
  }
  if(claimed){ // 내가 방 생성 → 상대에게 초대장
    const roomId=CODE();
    await createRoom(roomId,n,true);
    await update(ref(db,`rooms/${roomId}/players/${claimed.ouid}`),{nick:claimed.nick,hp:5000});
    await set(ref(db,"invites/"+claimed.ouid),roomId);
    enterRoom(roomId,true); return;
  }
  // 2) 대기열 등록 후 초대 대기
  G.queueRef=ref(db,"queue/"+uid);
  await set(G.queueRef,{nick:n,ts:now()});
  onDisconnect(G.queueRef).remove();
  const invRef=ref(db,"invites/"+uid);
  const u=onValue(invRef,s=>{
    if(!s.exists())return;
    const roomId=s.val();
    remove(invRef); remove(G.queueRef); clearTimeout(matchTimer);
    off(invRef); enterRoom(roomId,false);
  });
  unsub.push(()=>off(invRef));
  matchTimer=setTimeout(()=>{ remove(G.queueRef).catch(()=>{}); off(invRef); startBotGame(); },30000);
}

async function createRoom(roomId,nick,quick){
  await set(ref(db,"rooms/"+roomId),{
    created:now(), host:uid, ver:window.MOUNTAINS_VERSION, quick:!!quick,
    mts:pickBalancedSeeded(Math.floor(Math.random()*1e9),15),
    players:{[uid]:{nick,hp:5000}},
    state:{phase:"lobby",round:0}
  });
  onDisconnect(ref(db,`rooms/${roomId}/players/${uid}/left`)).set(true);
}
async function createFriendRoom(){
  const n=nickname(); if(!nickOk(n)) return;
  const roomId=CODE();
  await createRoom(roomId,n,false);
  $("waittitle").textContent=t("room_wait"); $("waitdesc").textContent=t("room_desc");
  $("roomcodebox").style.display="block"; $("roomcodebox").textContent=roomId;
  $("b-copycode").style.display="block";
  $("b-copycode").onclick=()=>{navigator.clipboard.writeText(roomId).then(()=>toast(t("copied")));};
  screen("wait");
  enterRoom(roomId,true,true);
}
async function joinRoom(){
  const n=nickname(); if(!nickOk(n)) return;
  const roomId=($("joincode").value||"").trim().toUpperCase();
  const s=await get(ref(db,"rooms/"+roomId));
  if(!s.exists()){toast(t("no_room"));return;}
  const room=s.val();
  if(Object.keys(room.players||{}).length>=2){toast(t("room_full"));return;}
  if(room.ver!==window.MOUNTAINS_VERSION){toast(t("version_err"));return;}
  await update(ref(db,`rooms/${roomId}/players/${uid}`),{nick:n,hp:5000});
  onDisconnect(ref(db,`rooms/${roomId}/players/${uid}/left`)).set(true);
  enterRoom(roomId,false);
}

function enterRoom(roomId,iAmHost,stayOnWait){
  G={mode:"net",fb:true,roomId,iAmHost,roomRef:ref(db,"rooms/"+roomId),phase:"lobby",shownRound:0,hostActing:iAmHost};
  const rref=G.roomRef;
  const u=onValue(rref,snap=>{
    if(!snap.exists()){ if(G&&G.phase!=="end"){cleanupGame();screen("home");} return; }
    const room=snap.val(); if(!G) return;
    const players=room.players||{};
    const foeUid=Object.keys(players).find(k=>k!==uid);
    const me=players[uid], foe=foeUid?players[foeUid]:null;
    G.foeUid=foeUid;

    // 상대 이탈 → 부전승
    if(foe&&foe.left&&room.state.phase!=="end"&&G.phase!=="end"){
      G.phase="end"; update(ref(db,`rooms/${roomId}/state`),{phase:"end"}).catch(()=>{});
      endBattle(me?me.hp:5000,foe.hp,foe.nick,true);
      remove(rref).catch(()=>{}); return;
    }
    // 호스트 이탈 시 남은 쪽이 진행 담당
    if(room.host!==uid && players[room.host] && players[room.host].left) G.hostActing=true;
    if(room.host===uid) G.hostActing=true;

    // 로비 → 두 명 모이면 시작 (호스트가 트리거)
    if(room.state.phase==="lobby"){
      if(foe && G.hostActing && !G.startSent){
        G.startSent=true;
        update(ref(db,`rooms/${roomId}/state`),{phase:"guess",round:1,deadline:now()+16000});
      }
      return;
    }
    if(room.state.phase==="guess") netGuessPhase(room,me,foe);
    if(room.state.phase==="reveal") netRevealPhase(room,me,foe);
    if(room.state.phase==="end" && G.phase!=="end"){
      G.phase="end";
      endBattle(me.hp,foe?foe.hp:0,foe?foe.nick:"?");
      if(G&&G.iAmHost) remove(rref).catch(()=>{});
    }
  });
  unsub.push(()=>off(G&&G.roomRef?G.roomRef:ref(db,"rooms/"+roomId)));
}

function netGuessPhase(room,me,foe){
  const r=room.state.round;
  if(G.shownRound!==r){
    G.shownRound=r; G.submitted=false;
    if(r===1) battleUIBase(me.nick,foe?foe.nick:"…");
    battleRoundUI(r); setHP(me.hp,foe?foe.hp:5000);
    showMountain(MT[room.mts[r-1]]); if(r===1)toast(t("start_in"));
    screen("game");
  }
  G.phase="guess";
  runTimer(room.state.deadline,()=>{
    if(!G.submitted) netSubmit(null,room);
    if(G.hostActing) hostAdvance(room);
  });
  // 둘 다 제출됐으면 호스트가 즉시 진행
  const gs=(room.guesses||{})["r"+r]||{};
  if(G.hostActing && G.foeUid && gs[uid]!==undefined && gs[G.foeUid]!==undefined) hostAdvance(room);
}
async function netSubmit(raw,roomSnap){
  if(!G||G.submitted)return; G.submitted=true;
  $("guess").disabled=true;$("b-submit").disabled=true;
  $("waitmsg").textContent=t("submit_done");
  const room=roomSnap|| (await get(G.roomRef)).val(); if(!room)return;
  const v = raw==null ? -1 : fromUnit(raw);
  await set(ref(db,`rooms/${G.roomId}/guesses/r${room.state.round}/${uid}`),v);
}
async function hostAdvance(roomMaybe){
  if(G.advancing)return; G.advancing=true;
  try{
    const room=(await get(G.roomRef)).val(); if(!room||room.state.phase!=="guess"){G.advancing=false;return;}
    const r=room.state.round, gs=(room.guesses||{})["r"+r]||{};
    const uids=Object.keys(room.players);
    const allIn=uids.every(u=>gs[u]!==undefined);
    if(!allIn && now()<room.state.deadline+600){G.advancing=false;return;}
    const actual=MT[room.mts[r-1]][2], mult=multOf(r);
    const upd={};
    uids.forEach(u=>{
      const g=gs[u]===undefined||gs[u]<0?null:gs[u];
      upd[`players/${u}/hp`]=room.players[u].hp - calcDamage(g,actual)*mult;
      upd[`players/${u}/lastG`]=g===null?-1:g;
      upd[`players/${u}/lastD`]=calcDamage(g,actual)*mult;
    });
    upd["state/phase"]="reveal"; upd["state/until"]=now()+4500;
    await update(G.roomRef,upd);
    setTimeout(async()=>{
      const cur=(await get(G.roomRef)).val(); if(!cur)return;
      const hs=Object.values(cur.players).map(p=>p.hp);
      const dead=hs.some(h=>h<=0), last=r>=15;
      if(dead||last) await update(ref(db,`rooms/${G.roomId}/state`),{phase:"end"});
      else await update(ref(db,`rooms/${G.roomId}/state`),{phase:"guess",round:r+1,deadline:now()+15600});
      G.advancing=false;
    },4600);
  }catch(e){G.advancing=false;}
}
function netRevealPhase(room,me,foe){
  if(G.phase==="reveal"||!foe)return; G.phase="reveal";
  cancelAnimationFrame(timerRAF);
  const actual=MT[room.mts[room.state.round-1]][2];
  $("guessarea").style.display="none"; $("revealarea").style.display="block";
  countUp($("altnum"),toUnit(actual)); setHP(me.hp,foe.hp);
  const f=g=>g===-1||g==null?"—":fmtH(g);
  $("cmparea").innerHTML =
    cmpBox(t("me"),f(me.lastG),"-"+(me.lastD||0)+" "+t("damage")) +
    cmpBox(foe.nick,f(foe.lastG),"-"+(foe.lastD||0)+" "+t("damage"));
  $("nextmsg").textContent=t("next_in");
  sndReveal((me.lastD||0)<=(foe.lastD||0));
  setTimeout(()=>{ if(G) G.phase="idle"; },4300);
}

/* ================= 공유 ================= */
function share(text){
  if(navigator.share){ navigator.share({text}).catch(()=>{}); }
  else navigator.clipboard.writeText(text).then(()=>toast(t("copied")));
}

/* ================= 별 배경 ================= */
(function(){
  const c=$("stars"),x=c.getContext("2d");
  function draw(){
    c.width=innerWidth;c.height=innerHeight;x.fillStyle="rgba(242,246,249,.8)";
    for(let i=0;i<90;i++){const r=Math.random();x.globalAlpha=.15+r*.5;
      x.beginPath();x.arc(Math.random()*c.width,Math.random()*c.height*.7,r*1.3,0,7);x.fill();}
  }
  draw(); addEventListener("resize",draw);
})();

$("b-practice").onclick=()=>startSolo("practice");

$("b-settings").onclick=()=>screen("settings");

$("b-cancelwait").onclick=()=>{cleanupGame();screen("battle");};
$("b-quitgame").onclick=()=>{
  if(G&&G.mode==="practice"&&G.pts.length){
    const avg=Math.round(G.pts.reduce((a,b)=>a+b,0)/G.pts.length);
    toast(t("practice_end")+" · "+t("rounds_played")+" "+G.pts.length+" · "+t("avg_pts")+" "+avg);
  }
  cleanupGame();screen("home");
};
$("b-submit").onclick=()=>submitGuess();
$("guess").addEventListener("keydown",e=>{if(e.key==="Enter")submitGuess();});
$("guess").addEventListener("input",e=>{e.target.value=e.target.value.replace(/[^\d]/g,"").slice(0,6);});
function submitGuess(){
  const v=$("guess").value.trim();
  const raw=v===""?null:parseInt(v,10);
  if(raw!==null&&(isNaN(raw)||raw<=0))return;
  if(!G)return;
  if(G.mode==="daily"||G.mode==="practice")soloSubmit(raw);
  else if(G.mode==="bot")botSubmit(raw);
  else if(G.mode==="net")netSubmit(raw);
}
$("langsel").onchange=e=>{L=e.target.value;localStorage.setItem("pk_lang",L);applyI18n();};
$("u-m").onclick=()=>{unit="m";localStorage.setItem("pk_unit","m");applyI18n();};
$("u-ft").onclick=()=>{unit="ft";localStorage.setItem("pk_unit","ft");applyI18n();};
$("snd-on").onclick=()=>{sound=true;localStorage.setItem("pk_sound","1");applyI18n();beep([659]);};
$("snd-off").onclick=()=>{sound=false;localStorage.setItem("pk_sound","0");applyI18n();};
$("joincode").addEventListener("input",e=>{e.target.value=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,"");});

applyI18n();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
